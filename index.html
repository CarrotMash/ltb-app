body{background:#FFF8E7;font-family:'Nunito',sans-serif;min-height:100vh;

.btn{font-family:'Bangers',Impact,cursive;letter-spacing:1.5px;font-size:14px;
  border:3px solid #1A1A2E;padding:5px 14px;cursor:pointer;background:#FFD700;color:#1A1A2E;

.btn:hover{transform:translate(-1px,-2px);box-shadow:4px 5px 0 #1A1A2E;}

.btn.dk{background:#1A1A2E;color:#FFD700;}
.card{border:3px solid #1A1A2E;background:#fff;cursor:pointer;
  box-shadow:4px 4px 0 #1A1A2E;position:relative;overflow:hidden;
  transition:transform .1s,box-shadow .1s;}
.card:hover{transform:translate(-2px,-3px);box-shadow:6px 7px 0 #1A1A2E;}
.card.own{border-color:#00AA44;box-shadow:4px 4px 0 #00AA44;}
.card.up{border-color:#FF8C00;border-style:dashed;}
.chip{display:inline-block;font-size:11px;font-weight:900;padding:2px 8px;

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;

.modal{background:#FFF8E7;border:4px solid #1A1A2E;max-width:500px;width:100%;

.icell{border:2px solid #1A1A2E;padding:8px 10px;background:#fff;}
.icell .lbl{font-size:9px;font-weight:900;text-transform:uppercase;color:#888;margin-bottom:3px;}
.icell .val{font-weight:900;font-size:14px;}
input[type=text],input[type=number],input[type=password],input[type=search]{
  border:3px solid #1A1A2E;padding:8px 10px;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;background:#fff;outline:none;box-shadow:3px 3px 0 #1A1A2E;}
input[type=range]{accent-color:#E8152A;width:100%;}
.pt{height:14px;border:3px solid #1A1A2E;background:#f0e8d0;overflow:hidden;flex:1;}
.pf{height:100%;background:linear-gradient(90deg,#00AA44,#FFD700);transition:width .5s;}
@keyframes bop{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.bop{animation:bop 1.1s infinite;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#E8152A;border:1px solid #1A1A2E;}

  if(!iso) return '–';

}

      year:d.d?parseInt(d.d):2026,date:d.d||null,

}

        headers:{'Content-Type':'application/json','x-api-key':key,

  ),

  /* ── FILTER BAR ─────────────────────────────────── */
  E('div',{style:{background:'#FFF8E7',borderBottom:'3px solid #1A1A2E',padding:'8px 14px',
    position:'sticky',top:0,zIndex:50,boxShadow:'0 4px 0 rgba(0,0,0,.1)'}},
    E('div',{style:{maxWidth:1300,margin:'0 auto',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
      E('div',{style:{position:'relative',flex:'1 1 160px',maxWidth:230}},
        E('span',{style:{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',
          fontSize:13,pointerEvents:'none'}},'🔍'),
        E('input',{type:'search',placeholder:'Nr. oder Titel…',value:search,
          onChange:e=>setSearch(e.target.value),style:{paddingLeft:28,width:'100%'}})
      ),
      ...[['all','Alle'],['owned','✓ Besitz'],['missing','✗ Fehlen'],['upcoming','Kommend']].map(([v,l])=>
        E('button',{key:v,className:'btn'+(filter===v?' on':''),onClick:()=>setFilter(v)},l)
      ),
      E('div',{style:{display:'flex',alignItems:'center',gap:6,flex:'1 1 180px'}},
        E('span',{style:{fontSize:10,fontWeight:900,color:'#888',whiteSpace:'nowrap'}},yearFrom+'–'+yearTo),
        E('input',{type:'range',min:1967,max:2026,value:yearFrom,
          onChange:e=>setYF(Math.min(+e.target.value,yearTo))}),
        E('input',{type:'range',min:1967,max:2026,value:yearTo,
          onChange:e=>setYT(Math.max(+e.target.value,yearFrom))})
      ),
      E('span',{style:{fontSize:11,fontWeight:900,color:'#E8152A',whiteSpace:'nowrap'}},filtered.length+' Bde.')
    )
  ),

  /* ── GRID ───────────────────────────────────────── */
  E('main',{style:{maxWidth:1300,margin:'0 auto',padding:'12px'}},
    filtered.length===0
      ? E('div',{style:{textAlign:'center',padding:'70px 20px'}},
          E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:30,color:'#ccc',letterSpacing:3}},
            'KEINE BÄNDE GEFUNDEN'))
      : E('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(85px,1fr))',gap:8}},
          ...filtered.map(vol=>
            E('div',{key:vol.nr,
              className:'card'+(vol.owned?' own':'')+(vol.upcoming?' up':''),
              onClick:()=>loadDetail(vol)},
              E('div',{style:{aspectRatio:'8/11',overflow:'hidden'}},
                E(Cover,{nr:vol.nr,owned:vol.owned,upcoming:vol.upcoming})
              ),
              E('div',{style:{padding:'3px 5px 17px',borderTop:'2px solid #1A1A2E'}},
                E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:11,
                  color:vol.upcoming?'#FF8C00':'#0066CC',letterSpacing:.5,lineHeight:1}},'LTB ',vol.nr),
                vol.title&&E('div',{style:{fontSize:7,fontWeight:900,lineHeight:1.25,marginTop:2,color:'#333',
                  overflow:'hidden',textOverflow:'ellipsis',
                  display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}},vol.title),
                E('div',{style:{fontSize:7,color:'#aaa',marginTop:1}},vol.year)
              ),
              E('button',{
                style:{position:'absolute',bottom:3,right:3,width:17,height:13,
                  border:'2px solid #1A1A2E',fontSize:8,fontWeight:900,
                  background:vol.owned?'#00AA44':'#fff',color:vol.owned?'#fff':'#555',
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                  padding:0,lineHeight:1},
                onClick:e=>{e.stopPropagation();toggleOwned(vol.nr);}
              },vol.owned?'✓':'○')
            )
          )
        )
  ),

  /* ── DETAIL MODAL ───────────────────────────────── */
  sel&&E('div',{className:'overlay',onClick:()=>{setSel(null);setDetail(null);}},
    E('div',{className:'modal',onClick:e=>e.stopPropagation()},
      E('div',{style:{padding:'12px 16px',background:'#E8152A',borderBottom:'3px solid #1A1A2E',
        backgroundImage:'radial-gradient(rgba(0,0,0,.1) 1px,transparent 1px)',backgroundSize:'6px 6px'}},
        E('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}},
          E('div',{style:{flex:1,minWidth:0}},
            E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:32,color:'#FFD700',
              textShadow:'-2px 2px 0 #1A1A2E',letterSpacing:3,lineHeight:1}},'LTB ',sel.nr),
            E('div',{style:{color:'#fff',fontWeight:900,fontSize:14,marginTop:3,wordBreak:'break-word'}},sel.title||'–'),
            sel.titleFirst&&sel.titleFirst!==sel.title&&
              E('div',{style:{color:'rgba(255,255,255,.7)',fontSize:11,marginTop:2}},
                'Erstauflage: ',E('em',null,sel.titleFirst))
          ),
          E('button',{onClick:()=>{setSel(null);setDetail(null);},
            style:{background:'#1A1A2E',color:'#FFD700',border:'2px solid #FFD700',
              cursor:'pointer',fontFamily:'Bangers,Impact,cursive',fontSize:16,
              padding:'3px 10px',letterSpacing:1,flexShrink:0}},'✕')
        )
      ),
      E('div',{style:{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}},
        E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          ...[['Erschienen',fmtDate(sel.date)],['Jahr',String(sel.year)],
              ['Status',sel.upcoming?'📅 Kommend':sel.owned?'✓ Im Besitz':'✗ Fehlt',
               sel.upcoming?'#FF8C00':sel.owned?'#00AA44':'#E8152A'],
              ['Band-Nr.','Nr. '+sel.nr]].map(([l,v,c])=>
            E('div',{key:l,className:'icell'},
              E('div',{className:'lbl'},l),
              E('div',{className:'val',style:c?{color:c}:{}},v)
            )
          )
        ),
        detLoad&&E('div',{style:{textAlign:'center',padding:'22px 0'}},
          E('div',{className:'bop',style:{fontSize:34}},'🦆'),
          E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:15,color:'#E8152A',
            letterSpacing:2,marginTop:6}},'ENTENHAUSEN WIRD BEFRAGT...')
        ),
        detail&&detail.noKey&&E('div',{style:{background:'#fff3cd',border:'2px solid #FF8C00',
          padding:'12px',textAlign:'center'}},
          E('div',{style:{fontWeight:900,fontSize:13,color:'#664d03'}},'Kein API-Key hinterlegt.'),
          E('div',{style:{fontSize:12,color:'#664d03',marginTop:4}},
            'Für Detailinfos bitte unter ⚙️ einen Anthropic API-Key eingeben.'),
          E('button',{className:'btn',style:{marginTop:10,fontSize:12},
            onClick:()=>{setSel(null);setDetail(null);setSettingsOpen(true);}},
            '⚙️ Einstellungen öffnen')
        ),
        detail&&!detail.error&&!detail.noKey&&E(React.Fragment,null,
          detail.inhalt&&E('div',{style:{border:'2px solid #1A1A2E',padding:'10px 12px',background:'#fff'}},
            E('div',{style:{fontSize:9,fontWeight:900,color:'#888',textTransform:'uppercase',marginBottom:4}},'🦆 Inhalt'),
            E('p',{style:{fontSize:13,lineHeight:1.65,color:'#333'}},detail.inhalt)
          ),
          detail.hauptfiguren&&detail.hauptfiguren.length>0&&E('div',null,
            E('div',{style:{fontSize:9,fontWeight:900,color:'#888',textTransform:'uppercase',marginBottom:5}},'🌟 Hauptfiguren'),
            E('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
              ...detail.hauptfiguren.map(f=>E('span',{key:f,className:'chip'},f))
            )
          ),
          detail.besonderheit&&detail.besonderheit!=='null'&&
            E('div',{style:{background:'#0066CC',border:'2px solid #1A1A2E',padding:'10px 12px'}},
              E('div',{style:{fontSize:9,fontWeight:900,color:'rgba(255,255,255,.7)',
                textTransform:'uppercase',marginBottom:4}},'⭐ Besonderheit'),
              E('p',{style:{fontSize:12,color:'#fff',fontWeight:700,lineHeight:1.5}},detail.besonderheit)
            )
        ),
        detail&&detail.error&&E('div',{style:{background:'#fff3cd',border:'2px solid #E8152A',
          padding:'10px',textAlign:'center'}},
          E('div',{style:{fontSize:13,color:'#E8152A',fontWeight:900}},'Details nicht verfügbar.'),
          E('button',{className:'btn',style:{marginTop:8,fontSize:11},onClick:()=>loadDetail(sel)},'🔄 Erneut versuchen')
        ),
        !sel.upcoming&&E('button',{className:'btn',
          style:{width:'100%',fontSize:16,padding:'10px',
            background:sel.owned?'#E8152A':'#00AA44',color:'#fff',border:'3px solid #1A1A2E'},
          onClick:()=>{toggleOwned(sel.nr);setSel(v=>({...v,owned:!v.owned}));}},
          sel.owned?'✗ Als fehlend markieren':'✓ Als Besitz markieren'
        )
      )
    )
  ),

  /* ── BULK MODAL ─────────────────────────────────── */
  bulk&&E('div',{className:'overlay',onClick:()=>setBulk(false)},
    E('div',{className:'modal',style:{maxWidth:360},onClick:e=>e.stopPropagation()},
      E('div',{style:{padding:'12px 16px',background:'#0066CC',borderBottom:'3px solid #1A1A2E',
        display:'flex',justifyContent:'space-between',alignItems:'center',
        backgroundImage:'radial-gradient(rgba(0,0,0,.12) 1px,transparent 1px)',backgroundSize:'6px 6px'}},
        E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:22,color:'#FFD700',
          textShadow:'-2px 2px 0 #1A1A2E',letterSpacing:2}},'⚡ BULK-MARKIERUNG'),
        E('button',{onClick:()=>setBulk(false),style:{background:'#1A1A2E',color:'#FFD700',
          border:'2px solid #FFD700',cursor:'pointer',fontFamily:'Bangers,Impact,cursive',
          fontSize:16,padding:'2px 8px'}},'✕')
      ),
      E('div',{style:{padding:16,display:'flex',flexDirection:'column',gap:12}},
        E('p',{style:{fontSize:13,fontWeight:700,color:'#555',lineHeight:1.5}},
          'Alle Bände von 1 bis zur gewählten Nummer auf einmal markieren.'),
        E('div',null,
          E('div',{style:{fontSize:10,fontWeight:900,color:'#888',textTransform:'uppercase',marginBottom:6}},
            'Bis einschließlich LTB '+bulkTo+':'),
          E('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            E('input',{type:'range',min:1,max:LATEST_NR,value:bulkTo,onChange:e=>setBulkTo(+e.target.value)}),
            E('input',{type:'number',min:1,max:LATEST_NR,value:bulkTo,style:{width:65},
              onChange:e=>setBulkTo(Math.max(1,Math.min(LATEST_NR,+e.target.value)))})
          )
        ),
        E('div',{style:{display:'flex',gap:8}},
          E('button',{className:'btn gr',style:{flex:1,fontSize:13},onClick:()=>bulkMark(bulkTo,true)},'✓ Als Besitz'),
          E('button',{className:'btn on',style:{flex:1,fontSize:13},onClick:()=>bulkMark(bulkTo,false)},'✗ Als fehlend')
        ),
        E('hr',{style:{border:'none',borderTop:'2px solid #eee'}}),
        E('div',{style:{display:'flex',gap:8}},
          E('button',{className:'btn',style:{flex:1,fontSize:11},onClick:()=>bulkMark(LATEST_NR,true)},'Alle als Besitz'),
          E('button',{className:'btn on',style:{flex:1,fontSize:11},onClick:()=>bulkMark(LATEST_NR,false)},'Alle als fehlend')
        )
      )
    )
  ),

  /* ── SETTINGS MODAL ─────────────────────────────── */
  settingsOpen&&E('div',{className:'overlay',onClick:()=>setSettingsOpen(false)},
    E('div',{className:'modal',style:{maxWidth:400},onClick:e=>e.stopPropagation()},
      E('div',{style:{padding:'12px 16px',background:'#1A1A2E',borderBottom:'3px solid #1A1A2E',
        display:'flex',justifyContent:'space-between',alignItems:'center'}},
        E('div',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:22,color:'#FFD700',letterSpacing:2}},'⚙️ EINSTELLUNGEN'),
        E('button',{onClick:()=>setSettingsOpen(false),style:{background:'#E8152A',color:'#fff',
          border:'2px solid #FFD700',cursor:'pointer',fontFamily:'Bangers,Impact,cursive',
          fontSize:16,padding:'2px 8px'}},'✕')
      ),
      E('div',{style:{padding:18,display:'flex',flexDirection:'column',gap:14}},
        E('div',{style:{border:'2px solid #1A1A2E',padding:'12px',background:'#fff'}},
          E('div',{style:{fontSize:10,fontWeight:900,color:'#888',textTransform:'uppercase',marginBottom:8}},'🔑 Anthropic API-Key'),
          E('p',{style:{fontSize:12,color:'#555',lineHeight:1.6,marginBottom:10}},
            'Für KI-Detailinfos wird ein Anthropic API-Key benötigt. Kostenlos unter: ',
            E('a',{href:'https://console.anthropic.com',target:'_blank',
              style:{color:'#0066CC',fontWeight:900}},'console.anthropic.com')
          ),
          E('input',{type:'password',placeholder:'sk-ant-...',value:apiKeyInput,
            onChange:e=>setApiKeyInput(e.target.value),style:{marginBottom:10}}),
          E('div',{style:{fontSize:11,color:'#888',marginBottom:10}},
            '⚠️ Key wird nur lokal im Browser gespeichert, nicht übertragen.'),
          E('button',{className:'btn gr',style:{width:'100%',fontSize:14},onClick:saveApiKey},'💾 Speichern'),
          localStorage.getItem(KEY_STORE)&&E('button',{className:'btn on',
            style:{width:'100%',fontSize:12,marginTop:8},
            onClick:()=>{localStorage.removeItem(KEY_STORE);setApiKeyInput('');
              showStatus('API-Key gelöscht.');setSettingsOpen(false);}},
            '🗑️ Key löschen')
        ),
        E('div',{style:{border:'2px solid #1A1A2E',padding:'12px',background:'#fff'}},
          E('div',{style:{fontSize:10,fontWeight:900,color:'#888',textTransform:'uppercase',marginBottom:8}},'🗄️ Sammlung'),
          E('p',{style:{fontSize:12,color:'#555',lineHeight:1.5,marginBottom:10}},
            'Dein Sammlungsstand wird lokal gespeichert. Exportiere ihn als Sicherung!'),
          E('button',{className:'btn dk',style:{width:'100%',fontSize:12,marginBottom:8},
            onClick:()=>{
              const raw=localStorage.getItem(STORE_KEY)||'{}';
              const nrs=Object.keys(JSON.parse(raw)).sort((a,b)=>+a-+b).join(',');
              const a=document.createElement('a');
              a.href=URL.createObjectURL(new Blob([nrs],{type:'text/plain'}));
              a.download='ltb-sammlung.txt';a.click();
              showStatus('📥 Export heruntergeladen!');setSettingsOpen(false);
            }},'📥 Sammlung exportieren'),
          E('button',{className:'btn',style:{width:'100%',fontSize:12},
            onClick:()=>{
              const inp=document.createElement('input');
              inp.type='file';inp.accept='.txt';
              inp.onchange=ev=>{
                const fr=new FileReader();
                fr.onload=e=>{
                  const nrs=e.target.result.split(',').map(n=>n.trim()).filter(Boolean);
                  const map={};nrs.forEach(n=>{if(!isNaN(n))map[+n]=true;});
                  localStorage.setItem(STORE_KEY,JSON.stringify(map));
                  setVols(prev=>prev.map(v=>({...v,owned:!!map[v.nr]})));
                  showStatus('✅ '+nrs.length+' Bände importiert!');setSettingsOpen(false);
                };fr.readAsText(ev.target.files[0]);
              };inp.click();
            }},'📤 Sammlung importieren')
        )
      )
    )
  ),

  /* ── FOOTER ─────────────────────────────────────── */
  E('footer',{style:{marginTop:20,borderTop:'3px solid #1A1A2E',background:'#1A1A2E',
    padding:'10px 14px',textAlign:'center'}},
    E('span',{style:{fontFamily:'Bangers,Impact,cursive',fontSize:13,color:'#FFD700',letterSpacing:2}},'LTB SAMMLER · '),
    E('span',{style:{fontSize:11,color:'#666'}},'Titeldaten aus offizieller Checkliste · Sammlung wird lokal gespeichert')
  )

  ); /* end App return */
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
